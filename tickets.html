<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tickets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tickets Registrados</h1>
  <div class="tickets-container">
    <table border="1" width="100%">
      <thead>
        <tr>
          <th>ID</th>
          <th>Asunto</th>
          <th>Estado</th>
          <th>Acciones</th> <!-- Nueva columna -->
        </tr>
      </thead>
      <tbody id="ticketList">
        <tr>
          <td>1</td>
          <td>Falla en impresora</td>
          <td>Abierto</td>
          <td><button class="btn-eliminar">Eliminar</button></td>
        </tr>
        <tr>
          <td>2</td>
          <td>Error en sistema</td>
          <td>Cerrado</td>
          <td><button class="btn-eliminar">Eliminar</button></td>
        </tr>
      </tbody>
    </table>
    <a href="nuevo-ticket.html">Crear nuevo ticket</a>
  </div>
</body>
</html>
