<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tickets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Tickets Registrados</h1>
  <div class="tickets-container">
    <table border="1" width="100%">
      <thead>
        <tr>
          <th>ID</th>
          <th>Asunto</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="ticketList">
        <!-- Aquí se llenarán los tickets dinámicamente -->
      </tbody>
    </table>
    <a href="nuevo-ticket.html">Crear nuevo ticket</a>
  </div>

  <script src="script.js"></script>
  <script>
    const ticketList = document.getElementById('ticketList');

    // Cargar tickets desde localStorage
    let tickets = JSON.parse(localStorage.getItem('tickets')) || [];

    function mostrarTickets() {
      ticketList.innerHTML = ''; // Limpiar tabla
      tickets.forEach((ticket, index) => {
        const fila = document.createElement('tr');
        fila.innerHTML = `
          <td>${ticket.id}</td>
          <td>${ticket.asunto}</td>
          <td>${ticket.estado}</td>
          <td><button class="btn-eliminar">Eliminar</button></td>
        `;
        ticketList.appendChild(fila);
      });

      // Funcionalidad de eliminar
      document.querySelectorAll('.btn-eliminar').forEach((btn, index) => {
        btn.addEventListener('click', () => {
          tickets.splice(index, 1); // Eliminar del array
          localStorage.setItem('tickets', JSON.stringify(tickets)); // Guardar cambios
          mostrarTickets(); // Volver a renderizar
        });
      });
    }

    mostrarTickets();
  </script>
</body>
</html>
